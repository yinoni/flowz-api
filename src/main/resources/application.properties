spring.application.name=flowz-api-builder

# ????? ???? ??????? ????? ??????? ?? ?????
spring.mongodb.uri=${MONGODB_URL}

logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG


spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASS}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED}

google.client.id=${GOOGLE_OAUTH_ID}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USER}
# ?? ??? ??: ?????? ??? ??? ?? ?????? ?????? ?? ????? ???!
# ??? ???? ?????? ?????? ???? ???, ?????? "????? ??-????" (2-Step Verification),
# ??? ????? "????? ????????" (App Password) ??????? ????? ???.
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jwt.secret=${JWT_SECRET}

spring.rabbitmq.addresses=${RABBITMQ_ADDRESS}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASS}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_USER}

spring.rabbitmq.ssl.enabled=true
spring.rabbitmq.listener.simple.prefetch=1
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=10000ms